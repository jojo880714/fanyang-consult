/* ---------- Section sec_costfull — 完整費用並排表 ---------- */
function renderSec_costfull(){
  const arr = visibleCampuses();
  const sec = document.getElementById('sec_costfull');
  if(!sec) return;
  if(arr.length === 0){ sec.innerHTML = ''; return; }

  const w = 4; // 4 週基準
  const fmtRange = (lo, hi) => lo === hi
    ? `NT$${lo.toLocaleString()}`
    : `NT$${lo.toLocaleString()}–${hi.toLocaleString()}`;

  // 計算每個校區的所有 cost line items
  const costs = arr.map(c => {
    const rate = State.rates[c.cur] || 30;
    // 學費（用 courseFrom 估低；hi 用 courseFrom×1.7 估範圍上緣）
    const tuLo = c.courseFrom * w;
    const tuHi = Math.round(c.courseFrom * w * 1.7);
    // 住宿（accommFrom × w 到 accommFrom × w × 1.7）
    const acLo = c.accommFrom * w;
    const acHi = Math.round(c.accommFrom * w * 1.7);
    // 生活費（spend.monthlyTotal × 1 month；解析範圍）
    const spend = c.spend || {monthlyTotal:`${c.cur}700–1000`};
    const spendMatch = spend.monthlyTotal.match(/([\d,]+)\D+([\d,]+)/);
    const liLo = spendMatch ? parseInt(spendMatch[1].replace(/,/g,'')) : 600;
    const liHi = spendMatch ? parseInt(spendMatch[2].replace(/,/g,'')) : 1000;
    // 雜費（取自 fees 陣列，加總）
    const feesTotal = (c.fees||[]).reduce((s, f) => {
      const m = f.v?.match(/(\d+)/);
      return s + (m ? parseInt(m[1]) : 0);
    }, 0);

    const tuTwdLo = Math.round(tuLo * rate);
    const tuTwdHi = Math.round(tuHi * rate);
    const acTwdLo = Math.round(acLo * rate);
    const acTwdHi = Math.round(acHi * rate);
    const liTwdLo = Math.round(liLo * rate);
    const liTwdHi = Math.round(liHi * rate);
    const feesTwd = Math.round(feesTotal * rate);
    const [flLo, flHi] = c.costExtras.flight;
    const [viLo, viHi] = c.costExtras.visa;
    const [inLo, inHi] = c.costExtras.insurance;

    const totalLo = tuTwdLo + acTwdLo + liTwdLo + flLo + viLo + inLo;
    const totalHi = tuTwdHi + acTwdHi + liTwdHi + flHi + viHi + inHi;

    return {
      c, tuLo, tuHi, acLo, acHi, liLo, liHi, feesTotal,
      tuTwdLo, tuTwdHi, acTwdLo, acTwdHi, liTwdLo, liTwdHi, feesTwd,
      flLo, flHi, viLo, viHi, inLo, inHi, totalLo, totalHi,
    };
  });

  const headRow = `<tr>
    <th class="cost-row-label-head">項目</th>
    ${costs.map(x => `<th class="cost-col"><span class="ch-flag">${x.c.flag}</span>${esc(x.c.name)}</th>`).join('')}
  </tr>`;

  // 每個 row 是一個 cost item
  const buildRow = (icon, label, getCell, totalRow) => `
    <tr${totalRow?' class="cost-total-row"':''}>
      <td class="cost-row-label">${iconHTML(icon,'14')}${esc(label)}</td>
      ${costs.map(x => `<td class="cost-cell">${getCell(x)}</td>`).join('')}
    </tr>
  `;

  const rows = [
    buildRow('🎓', `學費（${w} 週）`, x => `<span class="cost-cell-twd">${fmtRange(x.tuTwdLo, x.tuTwdHi)}</span><span class="cost-cell-raw">${x.c.cur}${x.tuLo.toLocaleString()}–${x.tuHi.toLocaleString()}</span>`),
    buildRow('🏠', `住宿費（${w} 週）`, x => `<span class="cost-cell-twd">${fmtRange(x.acTwdLo, x.acTwdHi)}</span><span class="cost-cell-raw">${x.c.cur}${x.acLo.toLocaleString()}–${x.acHi.toLocaleString()}</span>`),
    buildRow('✈️', '來回機票', x => `<span class="cost-cell-twd">${fmtRange(x.flLo, x.flHi)}</span>`),
    buildRow('📄', '簽證費', x => `<span class="cost-cell-twd">${x.viLo===0 && x.viHi===0 ? '免費' : fmtRange(x.viLo, x.viHi)}</span><span class="cost-cell-note">${esc(x.c.costExtras.visaNote)}</span>`),
    buildRow('🛡️', '學生保險（校方）', x => `<span class="cost-cell-twd">${fmtRange(x.inLo, x.inHi)}</span><span class="cost-cell-note">${w} 週</span>`),
    buildRow('🍜', '生活費（1 個月）', x => `<span class="cost-cell-twd">${fmtRange(x.liTwdLo, x.liTwdHi)}</span><span class="cost-cell-raw">${x.c.cur}${x.liLo.toLocaleString()}–${x.liHi.toLocaleString()}</span>`),
    buildRow('＝', '預估總計（4 週）', x => `<span class="cost-cell-twd">${fmtRange(x.totalLo, x.totalHi)}</span>`, true),
  ].join('');

  // 開課日（advisor-only placeholder until業主提供）
  const datesByCampus = costs.map(x => {
    const dates = x.c.nextDates || ['2026/01/12','2026/02/09','2026/03/09'];
    return `<span><strong>${x.c.flag} ${esc(x.c.name)}</strong>：${dates.map(d => `<span class="nd-pill">${esc(d)}</span>`).join('')}</span>`;
  }).join('');

  sec.innerHTML = `
    <div class="wrap">
      <div class="sec-h">
        <div class="sec-eyebrow">給家長帶回家看的版本</div>
        <div class="sec-title">這趟出國，你大概會花多少</div>
        <div class="sec-sub">所有費用項目並排呈現，台幣範圍一眼看完。</div>
      </div>
      <div class="cost-cmp-wrap">
        <div class="cost-cmp-scroll">
          <table class="cost-cmp">
            <thead>${headRow}</thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
      <div class="next-dates-bar">
        <span class="advisor-only data-pending-note">⚠️ 開課日為示範，待 EP 提供 2026 全年行事曆後更新</span>
        <strong>📅 最近開課日：</strong>${datesByCampus}
      </div>
      <div class="estimate-disclaimer">${icon('flame','16')}<div><b>僅供參考</b>：機票 / 簽證費 / 學生保險的台幣金額為示意估算，實際以當期報價為準。詳細費用以放洋報價單為主。</div></div>
      <div class="cost-note">
        <b>＊ 為什麼是範圍？</b>學費依課程強度（標準 / 密集 / 超密集）有差，住宿依房型有差，機票淡旺季差很多。<br>
        <b>＊ 不含的項目</b>：個人加購保險、英文檢定考試費、出國前體檢、額外旅行費。<br>
        <b>＊ 本表為 4 週基準</b>，較長修讀請以週數換算（學費 / 住宿 / 保險 / 生活費 × 週數倍率）。
      </div>
    </div>
  `;
}

function parsePricePerWeek(priceStr){
  if(!priceStr) return 0;
  // 排除非週費的計費方式（lump sum / per-class / 1-on-1 / 報價）
  if(/(\/課程|安置費|\/堂|一對一|One-to-One|lump|請洽詢)/i.test(priceStr)) return 0;
  const m = priceStr.replace(/,/g,'').match(/(\d+(?:\.\d+)?)/);
  if(!m) return 0;
  return parseFloat(m[1]);
}

function parsePricePerWeekFromCourse(co){
  // 課程名稱也檢查是否含「一對一」/「One-to-One」
  if(!co) return 0;
  if(/一對一|One-to-One/i.test(co.n||'')) return 0;
  return parsePricePerWeek(co.price);
}

function bindCalcCard(c){
  const root = document.querySelector(`.calc-card[data-campus="${c.key}"]`);
  if(!root) return;
  const cSel = root.querySelector('[data-role="course"]');
  const aSel = root.querySelector('[data-role="accomm"]');

  const pick = Sec07State.picks[c.key];
  // sync values
  if(cSel.querySelector(`option[value="${pick.course}"]`)) cSel.value = pick.course;
  if(aSel.querySelector(`option[value="${pick.accomm}"]`)) aSel.value = pick.accomm;

  cSel.onchange = () => { Sec07State.picks[c.key].course = parseInt(cSel.value); updateCalcCard(c); };
  aSel.onchange = () => { Sec07State.picks[c.key].accomm = parseInt(aSel.value); updateCalcCard(c); };
}

function updateCalcCard(c){
  const root = document.querySelector(`.calc-card[data-campus="${c.key}"]`);
  if(!root) return;
  const pick = Sec07State.picks[c.key];
  const co = c.courses[pick.course] || c.courses.find(x => parsePricePerWeekFromCourse(x));
  const ac = c.accomm[pick.accomm] || c.accomm.find(x => parsePricePerWeek(x.price));
  const cpw = parsePricePerWeekFromCourse(co);
  const apw = parsePricePerWeek(ac?.price || '');
  const w = Sec07State.weeks;

  const cTot = cpw * w, aTot = apw * w, tot = cTot + aTot;
  const rate = State.rates[c.cur] || 30;
  const twd = Math.round(tot * rate);

  // 生活費換算（月 ÷ 4.33 = 週，再乘週數）
  const monthlyLiving = State.livingMonthly[c.cur] || 800;
  const weeklyLiving = Math.round(monthlyLiving / 4.33);
  const totalLiving = weeklyLiving * w;
  const grandTotal = tot + totalLiving;
  const grandTwd = Math.round(grandTotal * rate);

  root.querySelector('[data-cell="course"]').textContent = `${c.cur}${cpw.toLocaleString()} × ${w} = ${c.cur}${cTot.toLocaleString()}`;
  root.querySelector('[data-cell="accomm"]').textContent = `${c.cur}${apw.toLocaleString()} × ${w} = ${c.cur}${aTot.toLocaleString()}`;
  root.querySelector('[data-cell="weeks"]').textContent = w;
  root.querySelector('[data-cell="total"]').textContent = `${c.cur}${tot.toLocaleString()}`;
  root.querySelector('[data-cell="twd"]').textContent = `≈ 台幣 ${twd.toLocaleString()}`;

  const livingEl = root.querySelector('[data-cell="living"]');
  if(livingEl){
    livingEl.innerHTML = `
      <div class="calc-living-row">
        <span>生活費參考（${w} 週）</span>
        <span>${c.cur}${weeklyLiving}/週 × ${w} = ${c.cur}${totalLiving.toLocaleString()}</span>
      </div>
      <div class="calc-living-row calc-living-grand">
        <span>課程＋住宿＋生活費總估算</span>
        <span>${c.cur}${grandTotal.toLocaleString()} ≈ 台幣 ${grandTwd.toLocaleString()}</span>
      </div>
      <div class="calc-living-note">
        生活費以 ${c.cur}${monthlyLiving}/月估算，不含住宿，依個人消費習慣差異較大。
      </div>
    `;
  }
}

function renderSec10(){
  const rows = CEFR.map(l => `
    <div class="cefr-row" data-anim style="--w:${l.w}%">
      <div><span class="cefr-badge cefr-${l.k.toLowerCase()}">${l.k}</span></div>
      <div class="cefr-name">${esc(l.n)}</div>
      <div class="cefr-bar-wrap"><div class="cefr-bar-fill"></div></div>
      <div class="cefr-hrs">${esc(l.hrs)}</div>
      <div class="cefr-test">IELTS ${esc(l.ielts)}<br>多益 ${esc(l.toeic)}</div>
    </div>
  `).join('');

  const opts = CEFR.map(l => `<option value="${l.k}">${l.k}（${l.n}）</option>`).join('');

  document.getElementById('sec10').innerHTML = `
    <div class="wrap">
      <div class="sec-h">
        <div class="sec-eyebrow">學語言要多久？</div>
        <div class="sec-title">進步的速度，比你想像的快</div>
        <div class="sec-sub">CEFR 是歐洲共同語言參考標準。每進一個等級約需 200 小時引導學習——密集課程加速這個過程。</div>
      </div>

      <div class="cefr-tbl">
        <div class="cefr-row cefr-head">
          <div>等級</div><div>名稱</div><div>進度（CEFR 對應）</div><div>累計時數</div><div>對應測驗</div>
        </div>
        ${rows}
      </div>

      <div class="cefr-calc">
        <span class="cefr-calc-l">目前程度</span>
        <select id="cefrFrom">${opts}</select>
        <span class="cefr-calc-l">→ 目標程度</span>
        <select id="cefrTo">${opts}</select>
        <div class="cefr-calc-result" id="cefrResult">—</div>
      </div>
      <div class="cefr-note">以密集課程 22 hr/週 估算；每進一個 CEFR 等級約需 200 小時引導學習。</div>
    </div>
  `;

  const fromSel = document.getElementById('cefrFrom');
  const toSel = document.getElementById('cefrTo');
  fromSel.value = 'A2';
  toSel.value = 'B2';

  function updateCefrCalc(){
    const f = CEFR.find(x => x.k === fromSel.value);
    const t = CEFR.find(x => x.k === toSel.value);
    const out = document.getElementById('cefrResult');
    if(!f || !t) return;
    if(CEFR.indexOf(t) <= CEFR.indexOf(f)){
      out.innerHTML = '目標需高於目前程度';
      return;
    }
    const steps = CEFR.indexOf(t) - CEFR.indexOf(f);
    const hours = steps * 200;
    const weeks = Math.ceil(hours / 22);
    out.innerHTML = `建議修讀約 <b>${weeks}</b> 週（${hours} 小時，密集課程 22 hr/週）`;
  }
  fromSel.onchange = updateCefrCalc;
  toSel.onchange = updateCefrCalc;
  updateCefrCalc();
}

      </a>
      <a class="float-contact-row" href="https://docs.google.com/forms/d/e/1FAIpQLScspZRqWNI1ySr1kjwxtxNVwLN8zHl45jmVBjkc-DzJFKpUbA/viewform" target="_blank" rel="noopener">
        ${icon('mail','18')}
        <span><strong>填寫轉介表單</strong><small>讓顧問先了解你的需求</small></span>
      </a>
    </div>
    <button class="float-contact-btn" id="floatContactBtn">
      ${icon('help-circle','18')}
      <span>問放洋</span>
    </button>
  `;
  document.body.appendChild(wrap);
  const btn = document.getElementById('floatContactBtn');
  const panel = document.getElementById('floatContactPanel');
  btn.onclick = () => panel.classList.toggle('is-hidden');
  document.addEventListener('click', (e) => {
    if(!wrap.contains(e.target)) panel.classList.add('is-hidden');
  });
}
